<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>충영이의 사생활</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-header__brand" href="#" aria-label="프로필 홈">
          <img src="images/header-profile/profile.jpeg" alt="김충영 프로필 이미지" />
        </a>

        <div class="site-header__identity">
          <h1 class="site-header__name">충영이의 야무진 블로그</h1>
          <p class="site-header__role">Bug Zero Frontend</p>
        </div>

        <nav class="site-header__social-nav" aria-label="소셜 링크">
          <a href="https://github.com/chungyo" target="_blank" rel="noreferrer" aria-label="GitHub">
            <img src="./images/header-profile/github.png" alt="" />
          </a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="page-layout">
        <aside class="page-sidebar">
          <nav class="side-toc" aria-label="페이지 목차">
            <ul class="side-toc__list">
              <li class="side-toc__item">
                <a href="#photo-dump">포토덤프</a>
              </li>
              <li class="side-toc__item">
                <a href="#gallery">사진첩</a>
              </li>
              <li class="side-toc__item">
                <a href="#interests">내 관심사</a>
              </li>
              <li class="side-toc__item">
                <a href="#message">웹왔니 친구들에게</a>
              </li>
            </ul>
          </nav>
        </aside>

        <section class="page-content">
          <section id="photo-dump" class="content-section">
            <h2>포토덤프</h2>
          </section>

          <section id="gallery" class="content-section">
            <h2>사진첩</h2>
          </section>

          <section id="interests" class="content-section">
            <h2>내 관심사</h2>
          </section>

          <section id="message" class="content-section">
            <h2>웹왔니 친구들에게</h2>
          </section>
        </section>
      </div>
    </main>
  </body>
</html>
