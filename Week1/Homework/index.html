<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>충영이의 사생활</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-header__brand" href="#" aria-label="프로필 홈">
          <img src="images/header-profile/profile.jpeg" alt="김충영 프로필 이미지" />
        </a>

        <div class="site-header__identity">
          <h1 class="site-header__name">충영이의 야물딱진 블로그</h1>
          <p class="site-header__role">Bug Zero Frontend</p>
        </div>

        <nav class="site-header__social-nav" aria-label="소셜 링크">
          <a href="https://github.com/chungyo" target="_blank" rel="noreferrer" aria-label="GitHub">
            <img src="./images/header-profile/github.png" alt="" />
          </a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="page-layout">
        <aside class="page-sidebar">
          <nav class="side-toc" aria-label="페이지 목차">
            <ul class="side-toc__list">
              <li class="side-toc__item">
                <a href="#photo-dump">포토덤프</a>
              </li>
              <li class="side-toc__item">
                <a href="#gallery">좋아하는 것: 🍜</a>
              </li>
              <li class="side-toc__item">
                <a href="#interests">내 관심사</a>
              </li>
              <li class="side-toc__item">
                <a href="#message">웹왔니 친구들에게</a>
              </li>
            </ul>
          </nav>
        </aside>

        <section class="page-content">
          <section class="photo-dump" id="photo-dump">
            <header class="section-header">
              <h2 class="section-header__title">포토덤프</h2>
            </header>

            <div class="photo-dump__grid">
              <figure class="photo-dump__item photo-dump__item--top-left">
                <img src="./images/photo-dump/photo-dump-01.png" alt="포토덤프 사진 1" />
              </figure>

              <figure class="photo-dump__item photo-dump__item--top-middle">
                <img src="./images/photo-dump/photo-dump-02.png" alt="포토덤프 사진 2" />
              </figure>

              <figure class="photo-dump__item photo-dump__item--top-wide">
                <img src="./images/photo-dump/photo-dump-03.png" alt="포토덤프 사진 3" />
              </figure>

              <figure class="photo-dump__item photo-dump__item--feature">
                <img src="./images/photo-dump/photo-dump-04.png" alt="포토덤프 사진 4" />
              </figure>

              <figure class="photo-dump__item photo-dump__item--side-top">
                <img src="./images/photo-dump/photo-dump-05.png" alt="포토덤프 사진 5" />
              </figure>

              <figure class="photo-dump__item photo-dump__item--side-bottom">
                <img src="./images/photo-dump/photo-dump-06.png" alt="포토덤프 사진 6" />
              </figure>
            </div>
          </section>


          <section class="gallery content-section" id="gallery">
            <header class="section-header">
              <h2 class="section-header__title">좋아하는 것: 🍜</h2>
            </header>

            <div class="gallery__marquee">
              <div class="gallery__track">
                <ul class="gallery__marquee-list">
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-01.png" alt="갤러리 사진 1" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-02.png" alt="갤러리 사진 2" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-03.png" alt="갤러리 사진 3" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-04.png" alt="갤러리 사진 4" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-05.png" alt="갤러리 사진 5" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-06.png" alt="갤러리 사진 6" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-07.png" alt="갤러리 사진 7" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-08.png" alt="갤러리 사진 8" /></li>
                </ul>

                <ul class="gallery__marquee-list" aria-hidden="true">
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-01.png" alt="" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-02.png" alt="" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-03.png" alt="" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-04.png" alt="" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-05.png" alt="" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-06.png" alt="" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-07.png" alt="" /></li>
                  <li class="gallery__marquee-item"><img class="gallery__image" src="./images/gallery/gallery-08.png" alt="" /></li>
                </ul>
              </div>
            </div>

            <div class="gallery__scroller">
              <ul class="gallery__list">
                <li class="gallery__item"><img class="gallery__image" src="./images/gallery/gallery-01.png" alt="갤러리 사진 1" /></li>
                <li class="gallery__item"><img class="gallery__image" src="./images/gallery/gallery-02.png" alt="갤러리 사진 2" /></li>
                <li class="gallery__item"><img class="gallery__image" src="./images/gallery/gallery-03.png" alt="갤러리 사진 3" /></li>
                <li class="gallery__item"><img class="gallery__image" src="./images/gallery/gallery-04.png" alt="갤러리 사진 4" /></li>
                <li class="gallery__item"><img class="gallery__image" src="./images/gallery/gallery-05.png" alt="갤러리 사진 5" /></li>
                <li class="gallery__item"><img class="gallery__image" src="./images/gallery/gallery-06.png" alt="갤러리 사진 6" /></li>
                <li class="gallery__item"><img class="gallery__image" src="./images/gallery/gallery-07.png" alt="갤러리 사진 7" /></li>
                <li class="gallery__item"><img class="gallery__image" src="./images/gallery/gallery-08.png" alt="갤러리 사진 8" /></li>
              </ul>
            </div>
          </section>

          <section class="interests content-section" id="interests">
            <header class="section-header">
              <h2 class="section-header__title">내 관심사</h2>
            </header>

            <ul class="interest-grid">
              <li>
                <article class="interest-card">
                  <figure>
                    <img src="./images/interest/interest-01.png" alt="위스키 이미지" />
                  </figure>
                  <div class="interest-card__body">
                    <h3>위스키</h3>
                    <div class="interest-card__buttons">
                      <button type="button" class="interest-card__button interest-card__button--like">좋아요</button>
                      <button type="button" class="interest-card__button interest-card__button--hate">싫어요</button>
                    </div>
                  </div>
                </article>
              </li>

              <li>
                <article class="interest-card">
                  <figure>
                    <img src="./images/interest/interest-02.png" alt="한로로 이미지" />
                  </figure>
                  <div class="interest-card__body">
                    <h3>한로로</h3>
                    <div class="interest-card__buttons">
                      <button type="button" class="interest-card__button interest-card__button--like">좋아요</button>
                      <button type="button" class="interest-card__button interest-card__button--hate">싫어요</button>
                    </div>
                  </div>
                </article>
              </li>

              <li>
                <article class="interest-card">
                  <figure>
                    <img src="./images/interest/interest-03.png" alt="라멘 이미지" />
                  </figure>
                  <div class="interest-card__body">
                    <h3>라멘</h3>
                    <div class="interest-card__buttons">
                      <button type="button" class="interest-card__button interest-card__button--like">좋아요</button>
                      <button type="button" class="interest-card__button interest-card__button--hate">싫어요</button>
                    </div>
                  </div>
                </article>
              </li>

              <li>
                <article class="interest-card">
                  <figure>
                    <img src="./images/interest/interest-04.png" alt="진격의 거인 이미지" />
                  </figure>
                  <div class="interest-card__body">
                    <h3>진격의 거인</h3>
                    <div class="interest-card__buttons">
                      <button type="button" class="interest-card__button interest-card__button--like">좋아요</button>
                      <button type="button" class="interest-card__button interest-card__button--hate">싫어요</button>
                    </div>
                  </div>
                </article>
              </li>

              <li>
                <article class="interest-card">
                  <figure>
                    <img src="./images/interest/interest-05.png" alt="유다빈밴드 이미지" />
                  </figure>
                  <div class="interest-card__body">
                    <h3>유다빈밴드</h3>
                    <div class="interest-card__buttons">
                      <button type="button" class="interest-card__button interest-card__button--like">좋아요</button>
                      <button type="button" class="interest-card__button interest-card__button--hate">싫어요</button>
                    </div>
                  </div>
                </article>
              </li>

              <li>
                <article class="interest-card">
                  <figure>
                    <img src="./images/interest/interest-06.png" alt="Muse 이미지" />
                  </figure>
                  <div class="interest-card__body">
                    <h3>Muse</h3>
                    <div class="interest-card__buttons">
                      <button type="button" class="interest-card__button interest-card__button--like">좋아요</button>
                      <button type="button" class="interest-card__button interest-card__button--hate">싫어요</button>
                    </div>
                  </div>
                </article>
              </li>

              <li>
                <article class="interest-card">
                  <figure>
                    <img src="./images/interest/interest-07.png" alt="맛집 탐방 이미지" />
                  </figure>
                  <div class="interest-card__body">
                    <h3>맛집 탐방</h3>
                    <div class="interest-card__buttons">
                      <button type="button" class="interest-card__button interest-card__button--like">좋아요</button>
                      <button type="button" class="interest-card__button interest-card__button--hate">싫어요</button>
                    </div>
                  </div>
                </article>
              </li>
            </ul>
          </section>


          <section class="message content-section" id="message">
            <header class="section-header">
              <h2 class="section-header__title">To. 우리집에 웹왔니</h2>
            </header>

            <div class="message__box">
              <ul class="message__list">
                <li class="message__item">잘 부탁드립니당</li>
                <li class="message__item">훌륭한 웹 개발자가 되어 봅시다.</li>
              </ul>
            </div>
          </section>

        </section>
      </div>
    </main>

    <footer class="site-footer">
      <p>2026 SOPT 1주차 과제</p>
      <small>감사합니다. 꾸벅</small>
    </footer>
  </body>
</html>
